name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Export static files
        run: npx next export

      - name: Deploy to username.github.io
        run: |
          cd out
          git init
          git config user.name "Dogukan Arslan"
          git config user.email "dogukan2arslan@hotmail.com"
          git add .
          git commit -m "Deploy site"
          git branch -M main
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/username/username.github.io.git
          git push --force origin main
